<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dobrodiy — Volunteer Registration</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo-area">
        <div class="logo-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg></div>
        <div class="logo-text"><strong>Dobrodiy</strong><span>Volunteer together</span></div>
      </div>
      <nav class="stepper" aria-label="Progress">
        <div class="step-item completed"><span class="step-number">1</span><span class="step-label">Role</span></div>
        <div class="step-line"></div>
        <div class="step-item active"><span class="step-number">2</span><span class="step-label">Details</span></div>
        <div class="step-line"></div>
        <div class="step-item"><span class="step-number">3</span><span class="step-label">Verify</span></div>
        <div class="step-line"></div>
        <div class="step-item"><span class="step-number">4</span><span class="step-label">Profile</span></div>
      </nav>
    </header>

    <main class="card-container">
      <section id="page-employee" class="wizard-page active">
        <a href="role.html" class="back-link"><span class="arrow">&#8592;</span> Back</a>
        <h2>Create your volunteer account</h2>
        <p class="subtitle">Tell us a bit about yourself so charities can welcome you.</p>

        <div id="formError" class="form-error"></div>

        <form id="empForm" class="form-grid-layout">
          <div class="input-row">
            <div class="input-group"><label for="firstName">First name</label><input type="text" id="firstName" required /></div>
            <div class="input-group"><label for="surname">Surname</label><input type="text" id="surname" required /></div>
          </div>
          <div class="input-row">
            <div class="input-group"><label for="age">Age</label><input type="number" id="age" min="16" max="99" required /></div>
            <div class="input-group"><label for="email">Work email</label><input type="email" id="email" placeholder="name@company.com" required /></div>
          </div>
          <div class="input-row">
            <div class="input-group">
              <label for="phone">Phone number</label>
              <div class="phone-input-wrapper"><span class="flag-ua"><span class="ua-flag"></span><span class="flag-code">+380</span></span><input type="tel" id="phone" placeholder="XX XXX XXXX" required /></div>
              <small class="hint-text">Ukrainian numbers only</small>
            </div>
            <div class="input-group">
              <label for="password">Password</label><input type="password" id="password" minlength="8" required />
              <small class="hint-text">At least 8 characters</small>
            </div>
          </div>
          <div class="form-bottom-bar">
            <p class="terms-text">By submitting you agree to our Terms and Privacy Policy.</p>
            <button type="submit" class="btn-primary">Submit</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script>
    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return decodeURIComponent(parts.pop().split(';').shift());
      return null;
    }

    document.getElementById('empForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const btn = this.querySelector('.btn-primary');
      const errorEl = document.getElementById('formError');
      btn.disabled = true;
      btn.textContent = 'Submitting…';
      errorEl.classList.remove('visible');

      try {
        const res = await fetch('/api/auth/register/volunteer', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') || '' },
          body: JSON.stringify({
            firstName: document.getElementById('firstName').value.trim(),
            surname:   document.getElementById('surname').value.trim(),
            age:       document.getElementById('age').value,
            email:     document.getElementById('email').value.trim(),
            phone:     document.getElementById('phone').value.trim(),
            password:  document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Registration failed');

        localStorage.setItem('dobrodiy_user', JSON.stringify({
          userId:    data.userId,
          firstName: document.getElementById('firstName').value.trim(),
          surname:   document.getElementById('surname').value.trim(),
          email:     document.getElementById('email').value.trim(),
          role:      'volunteer',
        }));
        window.location.href = 'verify.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Submit';
      }
    });
  </script>
</body>
</html>
