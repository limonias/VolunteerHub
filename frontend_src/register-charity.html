<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dobrodiy — Charity Registration</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo-area">
        <div class="logo-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg></div>
        <div class="logo-text"><strong>Dobrodiy</strong><span>Volunteer together</span></div>
      </div>
      <nav class="stepper" aria-label="Progress">
        <div class="step-item completed"><span class="step-number">1</span><span class="step-label">Role</span></div>
        <div class="step-line"></div>
        <div class="step-item active"><span class="step-number">2</span><span class="step-label">Details</span></div>
        <div class="step-line"></div>
        <div class="step-item"><span class="step-number">3</span><span class="step-label">Verify</span></div>
        <div class="step-line"></div>
        <div class="step-item"><span class="step-number">4</span><span class="step-label">Profile</span></div>
      </nav>
    </header>

    <main class="card-container">
      <section id="page-charity" class="wizard-page active">
        <a href="role.html" class="back-link"><span class="arrow">←</span> Back</a>
        <h2>Register your organisation</h2>
        <p class="subtitle">We verify every charity to keep the community safe.</p>

        <form action="verify.html" method="get" class="form-grid-layout">
          <div class="input-row">
            <div class="input-group"><label for="org">Organisation name</label><input type="text" id="org" required /></div>
            <div class="input-group"><label for="edrpou">EDRPOU code</label><input type="text" id="edrpou" pattern="\d{8}" maxlength="8" required /><small class="hint-text">8-digit number</small></div>
          </div>
          <div class="input-row">
            <div class="input-group"><label for="orgEmail">Organisation email</label><input type="email" id="orgEmail" required /></div>
            <div class="input-group"><label for="cpassword">Password</label><input type="password" id="cpassword" minlength="8" required /></div>
          </div>

          <h3 class="section-divider-title">Contact person</h3>
          <div class="input-row">
            <div class="input-group"><label for="cpFirst">First name</label><input type="text" id="cpFirst" required /></div>
            <div class="input-group"><label for="cpSurname">Surname</label><input type="text" id="cpSurname" required /></div>
          </div>
          <div class="input-row">
            <div class="input-group">
              <label for="cpPhone">Phone number</label>
              <div class="phone-input-wrapper"><span class="flag-ua"><span class="ua-flag"></span><span class="flag-code">+380</span></span><input type="tel" id="cpPhone" placeholder="XX XXX XXXX" required /></div>
            </div>
            <div class="input-group"><label for="cpEmail">Work email</label><input type="email" id="cpEmail" required /></div>
          </div>

          <div class="form-bottom-bar">
            <p class="terms-text">By submitting you agree to our Terms and Privacy Policy.</p>
            <button type="submit" class="btn-primary">Submit</button>
          </div>
        </form>
      </section>
    </main>
  </div>
</body>
</html>
