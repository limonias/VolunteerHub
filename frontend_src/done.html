<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dobrodiy — Success</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo-area">
        <div class="logo-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg></div>
        <div class="logo-text"><strong>Dobrodiy</strong><span>Volunteer together</span></div>
      </div>
    </header>

    <main class="card-container">
      <section id="page-done" class="wizard-page active">
        <div class="welcome-icon-wrap"><div class="sparkle-icon">🎉</div></div>
        <h2>Welcome to Dobrodiy!</h2>
        <p class="subtitle">Your profile is ready. Taking you to your dashboard…</p>
        <div class="btn-group-welcome">
          <a href="dashboard.html" class="btn-primary">Go to dashboard →</a>
        </div>
      </section>
    </main>
  </div>
  <script>
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
  </script>
</body>
</html>
