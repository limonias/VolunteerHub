<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dobrodiy — Choose Role</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo-area">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        </div>
        <div class="logo-text"><strong>Dobrodiy</strong><span>Volunteer together</span></div>
      </div>
      <nav class="stepper" aria-label="Progress">
        <div class="step-item active"><span class="step-number">1</span><span class="step-label">Role</span></div>
        <div class="step-line"></div>
        <div class="step-item"><span class="step-number">2</span><span class="step-label">Details</span></div>
        <div class="step-line"></div>
        <div class="step-item"><span class="step-number">3</span><span class="step-label">Verify</span></div>
        <div class="step-line"></div>
        <div class="step-item"><span class="step-number">4</span><span class="step-label">Profile</span></div>
      </nav>
    </header>

    <main class="card-container">
      <section id="page-role" class="wizard-page active">
        <h2>How would you like to join?</h2>
        <p class="subtitle">Choose the role that fits you. You can always add another later.</p>

        <form id="role-form">
          <div class="role-grid">
            <label class="role-card">
              <input type="radio" name="role" value="employee" checked />
              <div class="role-card-content">
                <div class="card-icon">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                </div>
                <div class="card-text">
                  <strong>I want to volunteer</strong>
                  <span>For employees ready to dedicate time, skills, and care to local causes.</span>
                </div>
                <div class="custom-radio"></div>
              </div>
            </label>

            <label class="role-card">
              <input type="radio" name="role" value="charity" />
              <div class="role-card-content">
                <div class="card-icon">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M4 21V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v15M9 11h2m-2 4h2m4-4h2m-4 4h2"/></svg>
                </div>
                <div class="card-text">
                  <strong>We need volunteers</strong>
                  <span>For charities and non-profits looking to grow their volunteer community.</span>
                </div>
                <div class="custom-radio"></div>
              </div>
            </label>
          </div>

          <div class="form-actions-right">
            <button type="submit" class="btn-primary">Continue <span class="arrow">→</span></button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script>
    // Єдиний бекенд-фри скрипт, який просто перенаправляє на потрібний файл залежно від галочки
    document.getElementById('role-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const selectedRole = document.querySelector('input[name="role"]:checked').value;
      if (selectedRole === 'employee') {
        window.location.href = 'register-employee.html';
      } else {
        window.location.href = 'register-charity.html';
      }
    });
  </script>
</body>
</html>
